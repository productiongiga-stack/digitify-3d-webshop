<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="digitify-shell-boot.js?v=7"></script>
  <title>Digitify - Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=7" />
  <link rel="stylesheet" href="app.css?v=7" />
  <link rel="stylesheet" href="digitify-shell.css?v=7" />
</head>
<body class="theme-light digitify-shop-body" data-nav="shop" data-page-title="Shop">
  <main class="marketing-main">
    <section class="marketing-hero">
      <h1>Digitify Webshop</h1>
      <p>NFC-tags, LED lichtbakken en smart marketingproducten. Filter op 3D preview of standaard producten.</p>
      <div class="cta-row">
        <a class="btn-primary" href="/" style="text-decoration:none">3D producten bekijken</a>
        <a class="btn-secondary" href="/prijzen" style="text-decoration:none">Prijzen</a>
      </div>
    </section>

    <section class="marketing-panel">
      <h2>Productoverzicht</h2>
      <div class="shop-filter-tabs" id="shopCategoryFilters"></div>
      <div class="shop-cards" id="shopProducts"></div>
    </section>
  </main>

  <div id="siteFooterMount"></div>

  <script src="app.js?v=8"></script>
  <script src="digitify-shell.js?v=7"></script>
  <script src="site-page.js?v=7"></script>
</body>
</html>
