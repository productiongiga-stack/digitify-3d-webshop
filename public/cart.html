<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winkelmand — NEBULOUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="ambient-bg">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
  </div>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="/" class="logo"><span class="logo-mark">&#x2726;</span><span>NEBULOUS</span></a>
      <div class="nav-links">
        <a href="/designer" class="nav-link">Designer</a>
        <a href="/cart" class="nav-link active">Winkelmand</a>
        <a href="/dashboard" class="nav-link">Dashboard</a>
      </div>
      <div class="nav-right" style="display:flex;gap:.5rem;align-items:center">
        <span data-theme-switch></span>
        <span data-cart-icon></span>
        <span data-nav-user style="display:flex;gap:.5rem;align-items:center"></span>
      </div>
    </div>
  </nav>

  <main class="app-shell">
    <div class="app-main">
      <div class="checkout-progress">
        <div class="cp-step active">
          <div class="cp-num">1</div>
          <span>Winkelmand</span>
        </div>
        <div class="cp-line"></div>
        <div class="cp-step">
          <div class="cp-num">2</div>
          <span>Adres</span>
        </div>
        <div class="cp-line"></div>
        <div class="cp-step">
          <div class="cp-num">3</div>
          <span>Betaling</span>
        </div>
      </div>

      <div class="page-head">
        <span class="page-eyebrow">Stap 1 van 3</span>
        <h1 class="page-title">Jouw winkelmand</h1>
        <p class="page-sub">Bekijk je ontwerpen, pas aantallen aan en ga verder naar het adres.</p>
      </div>

      <div id="cartWrap"></div>
    </div>
  </main>

  <script src="/app.js"></script>
  <script>
    (async () => {
      const user = await NEB.requireAuth();
      if (!user) return;
      window.NEB_USER = user;
      await NEB.paintNav();
      await render();

      async function render() {
        const wrap = document.getElementById('cartWrap');
        const [{ items }, cfg] = await Promise.all([NEB.get('/api/cart'), NEB.config()]);

        if (!items.length) {
          wrap.innerHTML = `
            <div class="cart-empty">
              <h3>Je winkelmand is leeg</h3>
              <p class="muted">Ga naar de designer en voeg een eerste ontwerp toe.</p>
              <p style="margin-top:1.5rem"><a href="/" class="btn btn-primary">Start met ontwerpen</a></p>
            </div>`;
          return;
        }

        const subtotal = items.reduce((s, i) => s + (i.total || 0), 0);
        const pricing = cfg.pricing || {};
        const conversion = cfg.conversion || {};
        const ctaVariant = String(conversion.ctaVariant || 'SOFT').toUpperCase() === 'STRONG' ? 'STRONG' : 'SOFT';
        const shippingCost = Math.max(0, Number(pricing.shippingCost || 0));
        const shippingFreeEnabled = !!pricing.shippingFree;
        const shippingThreshold = Math.max(0, Number(pricing.shippingFreeThreshold || 0));
        const qualifiesFreeShipping = shippingFreeEnabled && (shippingThreshold <= 0 || subtotal >= shippingThreshold);
        const shipping = shippingCost <= 0 ? 0 : (qualifiesFreeShipping ? 0 : shippingCost);
        const total = subtotal + shipping;
        const shippingLabel = shipping === 0
          ? ((shippingCost > 0 && qualifiesFreeShipping) ? '<span class="free-tag">GRATIS</span>' : NEB.fmtEUR(0))
          : NEB.fmtEUR(shipping);
        const remainingForFree = shippingFreeEnabled && shippingThreshold > 0
          ? Math.max(0, shippingThreshold - subtotal)
          : 0;
        const checkoutCtaBase = ctaVariant === 'STRONG'
          ? String(conversion.cartCtaStrong || 'Bestelling plaatsen').trim()
          : String(conversion.cartCtaSoft || 'Bestelling plaatsen (nog niet betalen)').trim();
        const checkoutNote = String(conversion.checkoutNote || 'Na goedkeuring ontvang je je beveiligde betaallink per e-mail.').trim();
        const socialEnabled = conversion.socialProofEnabled !== false;
        const socialText = String(conversion.socialProofText || 'Gemiddelde goedkeuring op werkdagen: binnen 2 uur.').trim();
        const trustItems = [
          'Geen betaling op deze stap',
          'Beveiligde betaallink via e-mail',
          'Statusupdates in dashboard + mail'
        ];
        if (socialEnabled && socialText) trustItems.push(socialText);

        wrap.innerHTML = `
          <div class="cart-grid">
            <div class="cart-list">
              ${items.map(i => `
                <div class="cart-item" data-id="${i.id}">
                  ${i.preview_path
                    ? `<img class="ci-thumb" src="/${i.preview_path}" alt="">`
                    : `<div class="ci-thumb"></div>`}
                  <div class="ci-meta">
                    <h4>${i.color_hex ? `<span class="swatch-dot" style="background:${i.color_hex}"></span>` : ''}${escapeHtml(i.product_label || 'Product')} — ${escapeHtml(i.color_name || '—')}</h4>
                    <small>Maat ${i.size} · ${i.designs.length} ontwerp${i.designs.length === 1 ? '' : 'en'} · €${(i.unit_price + i.extras_price).toFixed(2).replace('.', ',')} per stuk${i.product_price_multiplier && Number(i.product_price_multiplier) !== 1 ? ` · factor x${Number(i.product_price_multiplier).toFixed(2)}` : ''}</small>
                    <div class="ci-qty" data-qty="${i.id}">
                      <button data-q="-1" aria-label="Verminder">&minus;</button>
                      <span>${i.qty}</span>
                      <button data-q="+1" aria-label="Verhoog">+</button>
                    </div>
                  </div>
                  <div class="ci-actions">
                    <div class="ci-price">${NEB.fmtEUR(i.total)}</div>
                    <button class="ci-remove" data-remove="${i.id}">Verwijder</button>
                  </div>
                </div>
              `).join('')}
            </div>

            <aside class="cart-summary">
              <h3>Overzicht</h3>
              <div class="sum-line"><span>Subtotaal</span><span>${NEB.fmtEUR(subtotal)}</span></div>
              <div class="sum-line"><span>Verzending</span><span>${shippingLabel}</span></div>
              <div class="sum-line total"><span>Totaal</span><span>${NEB.fmtEUR(total)}</span></div>
              ${remainingForFree > 0 ? `<p class="muted compact" style="margin:.55rem 0 0">Nog <strong>${NEB.fmtEUR(remainingForFree)}</strong> voor gratis verzending.</p>` : ''}

              <div style="margin:1.25rem 0 .5rem">
                <h3 style="margin-bottom:.65rem">Bezorgadres</h3>
                <div class="form-stack">
                  <div class="form-grid-2">
                    <div class="field"><label>Voornaam</label><input id="ck_firstName" value="${esc(user.firstName)}"></div>
                    <div class="field"><label>Achternaam</label><input id="ck_lastName" value="${esc(user.lastName)}"></div>
                  </div>
                  <div class="field"><label>E-mail</label><input id="ck_email" value="${esc(user.email)}"></div>
                  <div class="field"><label>Bedrijf (optioneel)</label><input id="ck_company" placeholder="Bedrijfsnaam"></div>
                  <div class="field"><label>Klant BTW (optioneel)</label><input id="ck_vat" placeholder="BE0123.456.789"></div>
                  <div class="field"><label>Adres</label><input id="ck_address" value="${esc(user.address)}"></div>
                  <div class="form-grid-2">
                    <div class="field"><label>Postcode</label><input id="ck_postcode" value="${esc(user.postcode)}"></div>
                    <div class="field"><label>Stad</label><input id="ck_city" value="${esc(user.city)}"></div>
                  </div>
                  <div class="field"><label>Telefoon (optioneel)</label><input id="ck_phone" value="${esc(user.phone)}"></div>
                  <label style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--text-2)">
                    <input type="checkbox" id="ck_save" checked> Adres opslaan voor volgende keer
                  </label>
                </div>
              </div>

              <button class="btn btn-primary btn-block" id="checkoutBtn" style="margin-top:.5rem">
                ${escapeHtml(checkoutCtaBase)} — ${NEB.fmtEUR(total)}
              </button>
              <div class="checkout-trust">
                ${trustItems.map(t => `<span>${escapeHtml(t)}</span>`).join('')}
              </div>
              <p class="muted compact" style="text-align:center;margin-top:.6rem">Levertijd: ${escapeHtml(cfg.pricing?.deliveryText || '3 werkdagen')} · ${escapeHtml(checkoutNote)}</p>
              <p style="margin-top:.55rem"><a href="/" class="btn btn-ghost btn-sm" style="width:100%">Nog een ontwerp toevoegen</a></p>
            </aside>
          </div>`;

        wrap.addEventListener('click', onClick);
        document.getElementById('checkoutBtn').addEventListener('click', placeOrder);
      }

      async function onClick(e) {
        const removeId = e.target.dataset?.remove;
        const qtyBtn = e.target.closest('[data-q]');
        if (removeId) {
          if (!confirm('Item verwijderen uit winkelmand?')) return;
          try {
            await NEB.del('/api/cart/' + removeId);
            NEB.toast('Verwijderd');
            await render();
            await NEB.paintCart();
          } catch (err) { NEB.toast(err.message, 'error'); }
          return;
        }
        if (qtyBtn) {
          const wrap = qtyBtn.closest('[data-qty]');
          const id = wrap.dataset.qty;
          const span = wrap.querySelector('span');
          const cur = Number(span.textContent) || 1;
          const next = Math.max(1, Math.min(99, cur + Number(qtyBtn.dataset.q)));
          if (next === cur) return;
          try {
            await NEB.put('/api/cart/' + id, { qty: next });
            await render();
            await NEB.paintCart();
          } catch (err) { NEB.toast(err.message, 'error'); }
        }
      }

      async function placeOrder() {
        const customer = {
          firstName: val('ck_firstName'), lastName: val('ck_lastName'), email: val('ck_email'),
          company: val('ck_company'), vatNumber: val('ck_vat'),
          address: val('ck_address'), postcode: val('ck_postcode'), city: val('ck_city'), phone: val('ck_phone')
        };
        const required = ['firstName','lastName','email','address','postcode','city'];
        for (const k of required) {
          if (!customer[k]) { NEB.toast('Vul alle adresvelden in', 'error'); document.getElementById('ck_' + k)?.focus(); return; }
        }
        const btn = document.getElementById('checkoutBtn');
        btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Bezig...';
        try {
          const res = await NEB.post('/api/orders', { customer, saveAddress: document.getElementById('ck_save').checked });
          NEB.toast('Bestelling geplaatst', 'success');
          location.href = '/dashboard?order=' + res.orderId;
        } catch (err) {
          btn.disabled = false; btn.textContent = orig;
          NEB.toast(err.message || 'Bestellen mislukt', 'error');
        }
      }

      function val(id) { return (document.getElementById(id)?.value || '').trim(); }
      function esc(s) { return String(s == null ? '' : s).replace(/"/g, '&quot;'); }
      function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
      }
    })();
  </script>
</body>
</html>
